<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="50%" style="stop-color:#FBE5A8"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
  </defs>

  <!-- Фон -->
  <rect width="100" height="100" fill="#0d181b" rx="20"/>

  <!-- Силуэт корабля (фрегат) -->
  <g transform="translate(20, 25) scale(0.6)">
    <!-- Корпус корабля -->
    <path d="M10 60 Q30 75 50 75 Q70 75 90 60 L85 50 Q50 55 15 50 Z"
          fill="url(#gold)" opacity="0.9"/>

    <!-- Мачта -->
    <rect x="48" y="15" width="4" height="45" fill="url(#gold)"/>

    <!-- Паруса -->
    <path d="M52 18 L85 35 L52 35 Z" fill="url(#gold)" opacity="0.7"/>
    <path d="M48 22 L15 38 L48 38 Z" fill="url(#gold)" opacity="0.5"/>

    <!-- Флаг -->
    <path d="M50 15 L65 20 L50 25 Z" fill="#D4AF37"/>

    <!-- Волны -->
    <path d="M5 75 Q15 70 25 75 Q35 80 45 75 Q55 70 65 75 Q75 80 85 75 Q95 70 95 75"
          stroke="url(#gold)" stroke-width="2" fill="none" opacity="0.5"/>
  </g>

  <!-- Буква Ф (если нужно) -->
  <!-- <text x="72" y="70" font-family="serif" font-size="28" font-weight="bold" fill="url(#gold)">Ф</text> -->
</svg>
